<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <base target="_top" />
        <title>Bridge</title>
    </head>

    <body>
        <div
            id="top-page"
            style="
                display: none;
                font-family: sans-serif;
                padding: 2rem;
                text-align: center;
                line-height: 1.6;
            "
        >
            <? if (!deploymentId) { ?>
            <p style="color: #c62828; font-weight: bold">
                無法取得部署 ID，請確認此腳本已部署為 Web 應用程式。
            </p>
            <? } else { ?>
            <p style="color: #2e7d32; font-weight: bold">
                ✅ 系統已自動完成初始化！
            </p>
            <p>
                部署 ID：<code><?= deploymentId ?></code> 已成功記錄。<br />
                現在您可以點擊下方連結前往報到系統。
            </p>
            <p style="margin-top: 1.5rem">
                <a
                    href="<?= redirectUrl ?>"
                    target="_top"
                    style="
                        background: #1976d2;
                        color: white;
                        padding: 10px 20px;
                        border-radius: 4px;
                        text-decoration: none;
                        display: inline-block;
                    "
                >
                    前往學員報到系統
                </a>
            </p>
            <? } ?>
        </div>

        <script>
            const isBridgeMode = "<?= isBridgeMode ?>" === "true";

            if (isBridgeMode) {
                // 1. 建立一條專屬的通訊地道 (MessageChannel)
                const channel = new MessageChannel();

                // 2. 監聽地道這一頭 (port1) 的訊息
                channel.port1.onmessage = function (event) {
                    const data = event.data;
                    if (!data || !data.action) return;

                    if (data.action === "checkInStudent") {
                        google.script.run
                            .withSuccessHandler((res) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "success",
                                    result: res,
                                }),
                            )
                            .withFailureHandler((err) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "error",
                                    error: err.message,
                                }),
                            )
                            .checkInStudent(
                                data.payload.id,
                                data.payload.sheetName,
                            );
                    } else if (data.action === "getMsgTemplate") {
                        google.script.run
                            .withSuccessHandler((res) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "success",
                                    result: res,
                                }),
                            )
                            .withFailureHandler((err) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "error",
                                    error: err.message,
                                }),
                            )
                            .getMsgTemplate();
                    } else if (data.action === "getCheckInSheets") {
                        google.script.run
                            .withSuccessHandler((res) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "success",
                                    result: res,
                                }),
                            )
                            .withFailureHandler((err) =>
                                channel.port1.postMessage({
                                    id: data.id,
                                    status: "error",
                                    error: err.message,
                                }),
                            )
                            .getCheckInSheets();
                    }
                };

                // 3. 把地道的另一頭 (port2) 透過 window.top 直接拋給最外層的 GitHub Pages
                window.top.postMessage({ action: "GAS_READY" }, "*", [
                    channel.port2,
                ]);
            } else {
                document.getElementById("top-page").style.display = "block";
            }
        </script>
    </body>
</html>
