<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base target="_top">
    <title>Bridge</title>
</head>

<body>
    <div id="top-page" style="display:none;font-family:sans-serif;padding:2rem;text-align:center;line-height:1.6;">
        <? if (saved) { ?>
        <p style="color:#2e7d32;font-weight:bold;">已儲存 ID 至 Properties。</p>
        <? } ?>
        <? if (!deploymentId) { ?>
        <p style="color:#c62828;font-weight:bold;">無法取得部署 ID，請確認此腳本已部署為 Web 應用程式。</p>
        <? } else { ?>
        <p>請點擊下方連結前往學員報到系統：</p>
        <p>
            <a href="<?= redirectUrl ?>" target="_top" style="font-size:1.1rem;">
                前往 kuomartin.github.io/reg_dev
            </a>
        </p>
        <? if (saveUrl) { ?>
        <p style="margin-top:1.5rem;">
            <a href="<?= saveUrl ?>" target="_self" style="font-size:0.95rem;color:#1976d2;">
                儲存目前 ID 至 Properties
            </a>
        </p>
        <? } ?>
        <? } ?>
    </div>

    <script>
        const isBridgeMode = '<?= isBridgeMode ?>' === 'true';

        if (isBridgeMode) {
            // 1. 建立一條專屬的通訊地道 (MessageChannel)
            const channel = new MessageChannel();

            // 2. 監聽地道這一頭 (port1) 的訊息，Warden 攔截不到這裡
            channel.port1.onmessage = function (event) {
                const data = event.data;
                if (!data || !data.action) return;

                if (data.action === 'checkInStudent') {
                    google.script.run
                        .withSuccessHandler(res => channel.port1.postMessage({ id: data.id, status: 'success', result: res }))
                        .withFailureHandler(err => channel.port1.postMessage({ id: data.id, status: 'error', error: err.message }))
                        .checkInStudent(data.payload);
                }
                else if (data.action === 'getMsgTemplate') {
                    google.script.run
                        .withSuccessHandler(res => channel.port1.postMessage({ id: data.id, status: 'success', result: res }))
                        .withFailureHandler(err => channel.port1.postMessage({ id: data.id, status: 'error', error: err.message }))
                        .getMsgTemplate();
                }
                else if (data.action === 'updateMsgTemplate') {
                    google.script.run
                        .withSuccessHandler(res => channel.port1.postMessage({ id: data.id, status: 'success', result: res }))
                        .withFailureHandler(err => channel.port1.postMessage({ id: data.id, status: 'error', error: err.message }))
                        .updateMsgTemplate(data.payload);
                }
            };

            // 3. 把地道的另一頭 (port2) 透過 window.top 直接拋給最外層的 GitHub Pages
            window.top.postMessage({ action: 'GAS_READY' }, '*', [channel.port2]);
        } else {
            document.getElementById('top-page').style.display = 'block';
        }
    </script>
</body>

</html>
